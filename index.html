<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlaceForge | Professional Editor</title>
    <style>
        :root {
            --gh-gray: #f6f8fa;
            --gh-border: #d0d7de;
            --pf-blue: #0969da;
            --pf-green: #2ea44f;
            --pf-dark: #24292f;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background: #fafafa; margin: 0; padding: 20px; color: var(--pf-dark); }
        
        .header { width: 100%; max-width: 1100px; margin-bottom: 20px; border-bottom: 1px solid var(--gh-border); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 600; }

        .controls { background: white; padding: 20px; border-radius: 8px; border: 1px solid var(--gh-border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; width: 100%; max-width: 1100px; box-sizing: border-box; }
        
        .row { display: flex; gap: 15px; margin-bottom: 15px; align-items: flex-end; flex-wrap: wrap; }
        .group { display: flex; flex-direction: column; gap: 4px; }
        
        .text-action-group { display: flex; align-items: center; background: #fff; border: 1px solid var(--gh-border); border-radius: 6px; padding: 2px; flex-grow: 1; }
        .text-action-group input, .text-action-group select { border: none; padding: 8px; outline: none; background: transparent; font-size: 14px; }
        .text-action-group select { border-left: 1px solid var(--gh-border); width: 150px; }
        .text-action-group button { border-radius: 4px; border: none; margin-left: 5px; height: 34px; }

        .canvas-outer { position: relative; background: #eee; padding: 40px; border-radius: 8px; border: 1px dashed #ccc; max-width: 100%; overflow: auto; }
        canvas { background: #fff; cursor: crosshair; display: block; box-shadow: 0 0 20px rgba(0,0,0,0.1); }

        button { padding: 8px 14px; cursor: pointer; border: 1px solid rgba(27,31,36,0.15); border-radius: 6px; background: var(--pf-green); color: white; font-weight: 500; font-size: 13px; }
        button:hover { background: #2c974b; }
        button.secondary { background: var(--gh-gray); color: var(--pf-dark); }
        button.export { background: var(--pf-dark); }
        button.danger { background: #fff; color: #cf222e; border-color: #cf222e; }
        button.danger:hover { background: #cf222e; color: #fff; }

        label { font-size: 10px; font-weight: 700; color: #57606a; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { padding: 8px; border: 1px solid var(--gh-border); border-radius: 6px; font-size: 13px; }
        
        .footer { margin-top: 20px; font-size: 11px; color: #888; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PlaceForge <span>/ studio</span></h1>
        <div style="font-size: 12px; color: var(--pf-blue); font-weight: bold;">v1.1.0 Stable</div>
    </div>

    <div class="controls">
        <div class="row">
            <div class="group">
                <label>Canvas Size</label>
                <div style="display: flex; gap: 4px;">
                    <input type="number" id="canvasW" value="800" style="width: 70px;" onchange="resizeCanvas()">
                    <input type="number" id="canvasH" value="450" style="width: 70px;" onchange="resizeCanvas()">
                </div>
            </div>
            <div class="group">
                <label>Presets</label>
                <select onchange="applyPreset(this.value)">
                    <option value="">Custom</option>
                    <option value="1920,1080">Desktop (16:9)</option>
                    <option value="1080,1080">Instagram Square</option>
                    <option value="1200,630">FB Shared Image</option>
                    <option value="800,400">Classic Placeholder</option>
                </select>
            </div>
            <div class="group" style="flex-grow: 1;">
                <label>Add Text Element</label>
                <div class="text-action-group">
                    <input type="text" id="textInput" placeholder="Type here..." style="flex-grow: 1;">
                    <select id="fontFamily" onchange="loadFont(this.value)">
                        <option value="sans-serif">System Sans</option>
                        <option value="Inter">Inter</option>
                        <option value="Poppins">Poppins</option>
                        <option value="Lora">Lora (Serif)</option>
                        <option value="Oswald">Oswald</option>
                        <option value="Montserrat">Montserrat</option>
                        <option value="Fira Code">Fira Code</option>
                        <option value="Playfair Display">Playfair Display</option>
                        <option value="Dancing Script">Dancing Script</option>
                    </select>
                    <button onclick="addText()">Add Text</button>
                </div>
            </div>
        </div>

        <div class="row" style="margin-bottom: 0; border-top: 1px solid #eee; padding-top: 15px;">
            <div class="group">
                <label>Add Shape</label>
                <div style="display: flex; gap: 8px;">
                    <button class="secondary" onclick="addShape('rect')">Rectangle</button>
                    <button class="secondary" onclick="addShape('circle')">Circle</button>
                    <input type="color" id="colorPicker" value="#0969da" style="height: 33px; width: 45px; padding: 2px;">
                </div>
            </div>
            <div class="group" style="margin-left: auto; flex-direction: row; align-items: flex-end;">
                <button class="secondary" style="border-color: var(--pf-blue); color: var(--pf-blue);" onclick="cropToElements()">Crop to Fit</button>
                <button class="export" onclick="exportImage('png')">Download PNG</button>
                <button class="export" onclick="exportSVG()">Download SVG</button>
                <button class="danger" onclick="clearCanvas()">Reset</button>
            </div>
        </div>
    </div>

    <div class="canvas-outer">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="footer">
        <b>DRAG</b> to move • <b>CORNER HANDLES</b> to resize • <b>RIGHT-CLICK</b> to delete element
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let elements = [];
    let selectedElement = null;
    let isDragging = false;
    let isResizing = false;
    let offsetX, offsetY;
    const HANDLE_SIZE = 8;

    function loadFont(font) {
        if (font === 'sans-serif') return;
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `https://fonts.googleapis.com/css2?family=${font.replace(/ /g, '+')}:wght@400;700&display=swap`;
        document.head.appendChild(link);
        document.fonts.load(`10pt "${font}"`).then(() => draw());
    }

    function applyPreset(val) {
        if (!val) return;
        const [w, h] = val.split(',');
        document.getElementById('canvasW').value = w;
        document.getElementById('canvasH').value = h;
        resizeCanvas();
    }

    function resizeCanvas() {
        canvas.width = document.getElementById('canvasW').value;
        canvas.height = document.getElementById('canvasH').value;
        draw();
    }

    function addText() {
        elements.push({
            type: 'text',
            content: document.getElementById('textInput').value || "PlaceForge",
            x: 100, y: 150,
            color: document.getElementById('colorPicker').value,
            fontSize: 60,
            fontFamily: document.getElementById('fontFamily').value
        });
        draw();
    }

    function addShape(shapeType) {
        elements.push({
            type: shapeType,
            x: 150, y: 150,
            w: 200, h: 150,
            r: 75,
            color: document.getElementById('colorPicker').value
        });
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        elements.forEach(el => {
            ctx.fillStyle = el.color;
            if (el.type === 'text') {
                ctx.font = `${el.fontSize}px "${el.fontFamily}"`;
                el.w = ctx.measureText(el.content).width;
                el.h = el.fontSize;
                ctx.fillText(el.content, el.x, el.y);
            } else if (el.type === 'rect') {
                ctx.fillRect(el.x, el.y, el.w, el.h);
            } else if (el.type === 'circle') {
                ctx.beginPath();
                ctx.arc(el.x, el.y, el.r, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw selection box and handle if selected
            if (el === selectedElement) {
                ctx.strokeStyle = '#0969da';
                ctx.lineWidth = 2;
                if (el.type === 'circle') {
                    ctx.strokeRect(el.x - el.r, el.y - el.r, el.r * 2, el.r * 2);
                    drawHandle(el.x + el.r, el.y + el.r);
                } else {
                    const yOff = el.type === 'text' ? -el.h : 0;
                    ctx.strokeRect(el.x, el.y + yOff, el.w, el.h);
                    drawHandle(el.x + el.w, el.y + yOff + el.h);
                }
            }
        });
    }

    function drawHandle(x, y) {
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#0969da';
        ctx.fillRect(x - HANDLE_SIZE/2, y - HANDLE_SIZE/2, HANDLE_SIZE, HANDLE_SIZE);
        ctx.strokeRect(x - HANDLE_SIZE/2, y - HANDLE_SIZE/2, HANDLE_SIZE, HANDLE_SIZE);
    }

    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        // Check if clicking resize handle of selected element
        if (selectedElement) {
            let hX, hY;
            const el = selectedElement;
            if (el.type === 'circle') { hX = el.x + el.r; hY = el.y + el.r; }
            else { hX = el.x + el.w; hY = el.y + (el.type === 'text' ? 0 : el.h); }

            if (Math.abs(mx - hX) < 10 && Math.abs(my - hY) < 10) {
                isResizing = true;
                return;
            }
        }

        // Hit detection for elements
        selectedElement = null;
        for (let i = elements.length - 1; i >= 0; i--) {
            const el = elements[i];
            let hit = false;
            if (el.type === 'text') {
                if (mx >= el.x && mx <= el.x + el.w && my >= el.y - el.h && my <= el.y) hit = true;
            } else if (el.type === 'rect') {
                if (mx >= el.x && mx <= el.x + el.w && my >= el.y && my <= el.y + el.h) hit = true;
            } else if (el.type === 'circle') {
                if (Math.sqrt((mx - el.x)**2 + (my - el.y)**2) < el.r) hit = true;
            }

            if (hit) {
                selectedElement = el;
                isDragging = true;
                offsetX = mx - el.x;
                offsetY = my - el.y;
                draw();
                return;
            }
        }
        draw();
    };

    window.onmousemove = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        if (isResizing && selectedElement) {
            const el = selectedElement;
            if (el.type === 'text') {
                el.fontSize = Math.max(10, mx - el.x) / (el.w / el.fontSize); 
            } else if (el.type === 'rect') {
                el.w = mx - el.x;
                el.h = my - el.y;
            } else if (el.type === 'circle') {
                el.r = Math.sqrt((mx - el.x)**2 + (my - el.y)**2) / 1.414;
            }
            draw();
        } else if (isDragging && selectedElement) {
            selectedElement.x = mx - offsetX;
            selectedElement.y = my - offsetY;
            draw();
        }
    };

    window.onmouseup = () => { isDragging = false; isResizing = false; };

    canvas.oncontextmenu = (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        elements = elements.filter(el => {
            let hit = (mx >= el.x && mx <= el.x + el.w && my >= (el.type==='text'?el.y-el.h:el.y) && my <= (el.type==='text'?el.y:el.y+el.h));
            if (el.type === 'circle') hit = Math.sqrt((mx - el.x)**2 + (my - el.y)**2) < el.r;
            return !hit;
        });
        selectedElement = null;
        draw();
    };

    function cropToElements() {
        if (elements.length === 0) return;
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        elements.forEach(el => {
            let x1, y1, x2, y2;
            if (el.type === 'circle') { x1 = el.x - el.r; y1 = el.y - el.r; x2 = el.x + el.r; y2 = el.y + el.r; }
            else { x1 = el.x; y1 = el.type === 'text' ? el.y - el.h : el.y; x2 = el.x + el.w; y2 = y1 + el.h; }
            minX = Math.min(minX, x1); minY = Math.min(minY, y1);
            maxX = Math.max(maxX, x2); maxY = Math.max(maxY, y2);
        });
        
        const padding = 20;
        elements.forEach(el => { el.x -= (minX - padding); el.y -= (minY - padding); });
        document.getElementById('canvasW').value = Math.ceil(maxX - minX + padding * 2);
        document.getElementById('canvasH').value = Math.ceil(maxY - minY + padding * 2);
        resizeCanvas();
    }

    function clearCanvas() { elements = []; selectedElement = null; draw(); }

    function exportImage(format) {
        selectedElement = null; // Hide handles
        draw();
        const link = document.createElement('a');
        link.download = `placeforge-${Date.now()}.${format}`;
        link.href = canvas.toDataURL(`image/${format}`);
        link.click();
    }

    function exportSVG() {
        let items = elements.map(el => {
            if (el.type === 'text') return `<text x="${el.x}" y="${el.y}" font-family="'${el.fontFamily}'" font-size="${el.fontSize}" fill="${el.color}">${el.content}</text>`;
            if (el.type === 'rect') return `<rect x="${el.x}" y="${el.y}" width="${el.w}" height="${el.h}" fill="${el.color}" />`;
            if (el.type === 'circle') return `<circle cx="${el.x}" cy="${el.y}" r="${el.r}" fill="${el.color}" />`;
        }).join('\n');
        
        const fontsUsed = [...new Set(elements.filter(e => e.type === 'text').map(e => e.fontFamily))];
        const fontImports = fontsUsed.map(f => `@import url('https://fonts.googleapis.com/css2?family=${f.replace(/ /g, '+')}&display=swap');`).join('\n');

        const data = `<svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}"><style>${fontImports}</style>${items}</svg>`;
        const blob = new Blob([data], {type: 'image/svg+xml;charset=utf-8'});
        const link = document.createElement('a');
        link.download = 'placeforge-export.svg';
        link.href = URL.createObjectURL(blob);
        link.click();
    }

    resizeCanvas();
</script>
</body>
</html>
